name: Build MaliOpt Plugin APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configura Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Instala NDK 27
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Permissao para gradlew
        run: chmod +x gradlew

      - name: Build APK (Release)
        run: ./gradlew assembleRelease --stacktrace

      - name: Sobe o APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: MaliOpt-Plugin-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
